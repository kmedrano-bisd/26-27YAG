    <style>
        /* --- 90s RETRO PASTEL POP THEME --- */
        :root {
            --bg-color: #fcf6bd;     /* Pale Pastel Yellow */
            --card-bg: #ffffff;
            --primary-pop: #ff99c8;  /* Bubblegum Pink */
            --secondary-pop: #fec5bb;/* Pastel Coral */
            --accent-blue: #a9def9;   /* Sky Blue */
            --accent-purple: #e4c1f9; /* Lavender */
            --mint-green: #d0f4de;    /* Mint Green */
            --text-dark: #2b2d42;     /* Deep Navy */
            --border-thick: 3px solid #2b2d42;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Trebuchet MS', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            background: var(--primary-pop);
            padding: 20px;
            border-radius: 20px;
            border: var(--border-thick);
            box-shadow: 6px 6px 0px #2b2d42;
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            text-shadow: 2px 2px 0px var(--accent-blue);
        }

        header p {
            margin: 5px 0 0 0;
            font-weight: bold;
        }

        /* --- MONTH SELECTION NAVIGATION --- */
        .month-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .month-btn {
            background-color: var(--card-bg);
            color: var(--text-dark);
            font-size: 0.95rem;
            font-weight: bold;
            padding: 10px 16px;
            border: 2px solid var(--text-dark);
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 3px 3px 0px #2b2d42;
            transition: all 0.1s ease;
        }

        .month-btn:hover, .month-btn.active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #2b2d42;
            background-color: var(--accent-purple);
        }

        /* --- CALENDAR INTERFACE LAYOUT --- */
        .calendar-container {
            background: var(--card-bg);
            border: var(--border-thick);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 8px 8px 0px #2b2d42;
            max-width: 1200px;
            margin: 0 auto;
        }

        .calendar-heading {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .grid-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            text-align: center;
            font-weight: bold;
            background: var(--secondary-pop);
            padding: 12px;
            border-radius: 10px;
            border: 2px solid var(--text-dark);
            margin-bottom: 15px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        /* --- ITEM INTERACTION STATES --- */
        .day-card {
            background: #fff;
            border: 2px solid var(--text-dark);
            border-radius: 12px;
            min-height: 100px;
            padding: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 3px 3px 0px #2b2d42;
            transition: all 0.1s ease;
            position: relative;
        }

        .day-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px #2b2d42;
            background: var(--mint-green);
        }

        .day-card.active-selected {
            background: var(--accent-blue) !important;
            border-color: var(--text-dark);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
        }

        .day-card.holiday {
            background: #e2e2e2 !important;
            opacity: 0.75;
        }

        .day-card.cba {
            background: #ffd166 !important;
        }

        .day-num {
            font-weight: bold;
            font-size: 1.25rem;
        }

        .day-summary {
            font-size: 0.8rem;
            font-weight: bold;
            color: #333;
            margin-top: 6px;
            line-height: 1.2;
        }

        /* --- INLINE DETAIL EXPANSION DRAWER --- */
        .expansion-drawer {
            grid-column: span 5;
            background: #ffffff;
            border: 3px dashed var(--text-dark);
            border-radius: 15px;
            padding: 20px;
            margin: 5px 0 15px 0;
            box-shadow: 4px 4px 0px var(--text-dark);
            display: none;
            animation: fadeIn 0.25s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .drawer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        .track-panel {
            border: 2px solid var(--text-dark);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 3px 3px 0px var(--text-dark);
        }

        .track-onlevel { background-color: var(--mint-green); }
        .track-honors { background-color: var(--primary-pop); }

        .panel-title {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            border-bottom: 2px solid var(--text-dark);
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        .badge {
            background: var(--text-dark);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 6px;
        }
    </style>
</head>

        // --- CALENDAR SYSTEM CORE ENGINE ---
        function generateMonthGrid(monthKey) {
            const container = document.getElementById('days-grid-container');
            container.innerHTML = ''; // Completely purge active grid space
            
            const monthConfig = timelinePacing[monthKey];
            const contentData = monthConfig.content;
            
            // Step systematically day-by-day from Day 1 to Day 31
            for (let dayNum = 1; dayNum <= 31; dayNum++) {
                if (!contentData[dayNum]) continue; // Skip dates outside our scope
                
                const dayData = contentData[dayNum];
                const card = document.createElement('div');
                
                let classList = 'day-card';
                if (dayData.isHoliday) classList += ' holiday';
                if (dayData.isCba) classList += ' cba';
                card.className = classList;
                card.id = `card-${monthKey}-${dayNum}`;
                
                // Populate summary card content visible directly inside the grid view
                card.innerHTML = `
                    <div class="day-num">${dayNum}</div>
                    <div class="day-summary">${dayData.label}</div>
                `;
                
                // Create the matching dropdown expansion drawer element
                const drawer = document.createElement('div');
                drawer.className = 'expansion-drawer';
                drawer.id = `drawer-${monthKey}-${dayNum}`;
                
                if (dayData.isHoliday) {
                    drawer.innerHTML = `
                        <h3 style="margin-top:0; color:#c1121f;">🚨 ${dayData.label}</h3>
                        <p><strong>District Operational Status:</strong> ${dayData.focus}</p>
                    `;
                } else {
                    drawer.innerHTML = `
                        <h3 style="margin-top:0; color:var(--text-dark);">🎯 Daily Objective: ${dayData.focus}</h3>
                        <div class="drawer-grid">
                            <div class="track-panel track-onlevel">
                                <div class="panel-title">6th On-Level Base <span class="badge">TEKS Math</span></div>
                                <p style="margin: 0; font-size:0.9rem; line-height:1.4;">${dayData.onLevel}</p>
                            </div>
                            <div class="track-panel track-honors">
                                <div class="panel-title">7th Honors Path <span class="badge">Accelerated</span></div>
                                <p style="margin: 0; font-size:0.9rem; line-height:1.4;">${dayData.honors}</p>
                            </div>
                        </div>
                    `;
                }
                
                // Handle the user interaction event to expand the selected drawer element inline
                card.onclick = () => toggleDrawer(monthKey, dayNum);
                
                container.appendChild(card);
                container.appendChild(drawer);
            }
        }

        // --- INTERACTIVE INLINE TOGGLE METHOD ---
        function toggleDrawer(monthKey, dayNum) {
            const targetDrawer = document.getElementById(`drawer-${monthKey}-${dayNum}`);
            const targetCard = document.getElementById(`card-${monthKey}-${dayNum}`);
            const isCurrentlyVisible = targetDrawer.style.display === 'block';
            
            // Contract all open drawers across the view to clean up layout space
            document.querySelectorAll('.expansion-drawer').forEach(d => d.style.display = 'none');
            document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active-selected'));
            
            // If the element was closed, expand it immediately directly under its card row
            if (!isCurrentlyVisible) {
                targetDrawer.style.display = 'block';
                targetCard.classList.add('active-selected');
                targetDrawer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // --- SYSTEM TABS INITIALIZATION ENGINE ---
        function initSystem() {
            const tabsContainer = document.getElementById('month-tabs-container');
            const monthsList = Object.keys(timelinePacing);
            
            monthsList.forEach((monthKey, idx) => {
                const btn = document.createElement('button');
                btn.className = `month-btn ${idx === 0 ? 'active' : ''}`;
                btn.innerText = monthKey.toUpperCase();
                btn.onclick = (e) => {
                    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    document.getElementById('calendar-heading-title').innerText = `${monthKey} ${timelinePacing[monthKey].year}`;
                    generateMonthGrid(monthKey);
                };
                tabsContainer.appendChild(btn);
            });
            
            // Run the system initialization loop starting directly with August 2026 content
            generateMonthGrid(monthsList[0]);
        }

        window.onload = initSystem;
    </script>
